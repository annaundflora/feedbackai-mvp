services:
  postgres:
    image: postgres:16-alpine
    container_name: feedbackai-db
    environment:
      POSTGRES_USER: feedbackai
      POSTGRES_PASSWORD: feedbackai_dev
      POSTGRES_DB: feedbackai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/migrations/:/docker-entrypoint-initdb.d/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U feedbackai -d feedbackai"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
